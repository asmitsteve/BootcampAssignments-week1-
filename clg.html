<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Event Registration</title>
</head>
<body>

    <h1>
        College Event Registration 📝
    </h1>

    <form>

        <label for="name">Your Name:</label>
        <input type="text" id="name" size="30">
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" size="30">
        <br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" min="1" max="100" style="width:80px;">
        <br><br>

        <label>Select Event Category:</label>
        <br><br>

        <input type="checkbox" id="coding">
        <label for="coding">Coding Hackathon 💻</label>
        <br>

        <input type="checkbox" id="debate">
        <label for="debate">Debate Competition 🎤</label>
        <br>

        <input type="checkbox" id="sports">
        <label for="sports">Sports Tournament ⚽</label>

        <br><br><br>

        <label for="date">Event Date:</label>
        <input type="date" id="date">
        <br><br>

        <label for="time">Preferred Time Slot:</label>
        <input type="time" id="time">
        <br><br><br>

        <input type="submit" value="Register Now">

    </form>

</body>
</html>
